name: Build for Appetize

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: List schemes
        run: xcodebuild -project MeloPlayerClone.xcodeproj -list

      - name: Build
        run: |
          xcodebuild \
            -project MeloPlayerClone.xcodeproj \
            -scheme "MeloPlayerClone" \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            SYMROOT=build

      - name: Find app
        run: find build -name "*.app"

      - name: Zip app
        run: |
          APP=$(find build -name "*.app" | head -n 1)
          ditto -c -k --keepParent "$APP" Appetize.zip

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Appetize
          path: Appetize.zip