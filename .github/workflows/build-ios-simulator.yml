name: Build GlitchStreamer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: List schemes
        run: xcodebuild -project MeloPlayerClone.xcodeproj -list

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project MeloPlayerClone.xcodeproj \
            -scheme "MeloPlayerClone" \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            SYMROOT=build

      - name: Find .app
        run: find build -name "*.app"

      - name: Create unsigned IPA from .app
        run: |
          APP=$(find build -name "*.app" | head -n 1)
          APP_NAME=$(basename "$APP")

          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r GlitchStreamer.ipa Payload
          rm -rf Payload

          echo "[OK] IPA: $(wc -c < GlitchStreamer.ipa) bytes"

      - name: Bundle IPA and zipped .app
        run: |
          APP=$(find build -name "*.app" | head -n 1)
          APP_NAME=$(basename "$APP")
          BUNDLE_DIR="bundle"

          mkdir -p "$BUNDLE_DIR"
          cp GlitchStreamer.ipa "$BUNDLE_DIR/GlitchStreamer.ipa"
          (cd "$(dirname "$APP")" && zip -r "$GITHUB_WORKSPACE/$BUNDLE_DIR/$APP_NAME.zip" "$APP_NAME")

          cd "$BUNDLE_DIR"
          zip -r GlitchStreamer.zip GlitchStreamer.ipa "$APP_NAME.zip"
          echo "[OK] GlitchStreamer.zip: $(wc -c < GlitchStreamer.zip) bytes"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlitchStreamer
          path: bundle/GlitchStreamer.zip