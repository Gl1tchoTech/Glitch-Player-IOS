workflows:

  # ── Unsigned IPA Build ────────────────────────────────────────────
  meloplayer-build:
    name: ErrorStream Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: MeloPlayerClone.xcodeproj
        XCODE_SCHEME: MeloPlayerClone
        XCARCHIVE_PATH: build/ios/xcarchive/MeloPlayerClone.xcarchive
    scripts:
      - name: Regenerate clean pbxproj
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          python3 Resources/generate_xcodeproj.py
          PBX="$XCODE_PROJECT/project.pbxproj"
          echo "[OK] pbxproj: $(wc -c < "$PBX") bytes, JSON starts with: $(head -c60 "$PBX")"
      - name: Archive without code signing
        script: |
          set -e
          xcodebuild archive \
            -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -archivePath "$CM_BUILD_DIR/$XCARCHIVE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
      - name: Package unsigned IPA from archive
        script: |
          set -e
          mkdir -p "$CM_BUILD_DIR/build/ios/ipa/Payload"
          APP=$(find "$CM_BUILD_DIR/$XCARCHIVE_PATH/Products" -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app found in archive"
            exit 1
          fi
          cp -R "$APP" "$CM_BUILD_DIR/build/ios/ipa/Payload/"
          cd "$CM_BUILD_DIR/build/ios/ipa"
          zip -r ErrorStream.ipa Payload
          echo "[OK] IPA created: $(wc -c < ErrorStream.ipa) bytes"
      - name: Bundle IPA and zipped .app into GlitchStreamer.zip
        script: |
          set -e
          BUNDLE_DIR="$CM_BUILD_DIR/build/ios/bundle"
          mkdir -p "$BUNDLE_DIR"

          # Copy the unsigned IPA
          cp "$CM_BUILD_DIR/build/ios/ipa/ErrorStream.ipa" "$BUNDLE_DIR/ErrorStream.ipa"

          # Zip the raw .app from the archive
          APP=$(find "$CM_BUILD_DIR/$XCARCHIVE_PATH/Products" -name "*.app" -type d | head -1)
          APP_NAME=$(basename "$APP")
          (cd "$(dirname "$APP")" && zip -r "$BUNDLE_DIR/$APP_NAME.zip" "$APP_NAME")

          # Create final GlitchStreamer.zip containing both
          cd "$BUNDLE_DIR"
          zip -r GlitchStreamer.zip ErrorStream.ipa "$APP_NAME.zip"
          echo "[OK] GlitchStreamer.zip: $(wc -c < GlitchStreamer.zip) bytes"
          echo "  Contents: ErrorStream.ipa, $APP_NAME.zip"
    artifacts:
      - build/ios/bundle/GlitchStreamer.zip
      - build/ios/ipa/*.ipa
      - build/ios/xcarchive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - shadowvr7913@gmail.com
        notify:
          success: true
          failure: true
