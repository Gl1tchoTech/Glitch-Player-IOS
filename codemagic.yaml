workflows:

  # ── Unsigned IPA Build ────────────────────────────────────────────
  meloplayer-build:
    name: MeloPlayer Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: MeloPlayerClone.xcodeproj
        XCODE_SCHEME: MeloPlayerClone
        XCARCHIVE_PATH: build/ios/xcarchive/MeloPlayerClone.xcarchive
    scripts:
      - name: Fix pbxproj plist syntax (line endings + quoted values)
        script: |
          set -e
          PBX="$CM_BUILD_DIR/$XCODE_PROJECT/project.pbxproj"
          python3 -c "
import re
with open('$PBX', 'r') as f:
    data = f.read()

# 1. Strip any CRLF -> LF
data = data.replace('\r\n', '\n').replace('\r', '\n')

# 2. Quote GCC_PREPROCESSOR_DEFINITIONS value (contains spaces, \$)
data = re.sub(
    r'GCC_PREPROCESSOR_DEFINITIONS = DEBUG=1 .inherited.;',
    'GCC_PREPROCESSOR_DEFINITIONS = \"DEBUG=1 \$(inherited)\";',
    data
)

# 3. Quote iPad orientation string (contains spaces)
data = re.sub(
    r'INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad = UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight;',
    'INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad = \"UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight\";',
    data
)

# 4. Quote empty NSHumanReadableCopyright
data = re.sub(
    r'INFOPLIST_KEY_NSHumanReadableCopyright = ;',
    'INFOPLIST_KEY_NSHumanReadableCopyright = \"\";',
    data
)

with open('$PBX', 'w') as f:
    f.write(data)
print('[OK] pbxproj patched')
"
      - name: Archive without code signing
        script: |
          set -e
          xcodebuild archive \
            -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -archivePath "$CM_BUILD_DIR/$XCARCHIVE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
      - name: Write export options plist
        script: |
          cat > "$CM_BUILD_DIR/exportOptions.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          PLIST
      - name: Export unsigned ipa
        script: |
          set -e
          mkdir -p "$CM_BUILD_DIR/build/ios/ipa"
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/$XCARCHIVE_PATH" \
            -exportOptionsPlist "$CM_BUILD_DIR/exportOptions.plist" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - you@example.com          # <-- Replace with your email
        notify:
          success: true
          failure: true
