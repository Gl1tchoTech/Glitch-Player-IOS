workflows:

  # ── Ad Hoc Build (testing / sideloading) ─────────────────────────
  meloplayer-adhoc:
    name: MeloPlayer Ad Hoc
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.meloplayer.app
      vars:
        XCODE_PROJECT: MeloPlayerClone.xcodeproj
        XCODE_SCHEME: MeloPlayerClone
    scripts:
      - name: Set up provisioning profiles
        script: xcode-project use-profiles
      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - you@example.com          # <-- Replace with your email
        notify:
          success: true
          failure: true

  # ── App Store Build (IPA only, no publishing) ────────────────────
  meloplayer-release:
    name: MeloPlayer Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.meloplayer.app
      vars:
        XCODE_PROJECT: MeloPlayerClone.xcodeproj
        XCODE_SCHEME: MeloPlayerClone
    scripts:
      - name: Set up provisioning profiles
        script: xcode-project use-profiles
      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - you@example.com          # <-- Replace with your email
        notify:
          success: true
          failure: true
